services:
  chromadb:
    image: chromadb/chroma:1.5.1
    container_name: aria-chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/data
    environment:
      - ALLOW_RESET=false
      - ANONYMIZED_TELEMETRY=false
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:latest
    container_name: aria-n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - N8N_ENCRYPTION_KEY=change-me-before-production
      - GENERIC_TIMEZONE=UTC
    restart: unless-stopped

volumes:
  chroma-data:
  n8n-data:
